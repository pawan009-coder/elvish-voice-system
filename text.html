async function textToVoice(text) {
  let res = await fetch("https://singhp08-site.hf.space/run/predict", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      data: [text]
    })
  });

  let json = await res.json();
  return json.data[0]; // audio URL
}
